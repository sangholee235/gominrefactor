name: Deploy Client to EC2 (Develop)

on:
  push:
    branches:
      - develop
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-client-dev.yml'

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: ${{ secrets.ECR_CLIENT_REPOSITORY }}
  CONTAINER_NAME: gomin-client

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cd frontend
          docker build \
            --build-arg VITE_API_BASE_URL="${{ secrets.VITE_API_BASE_URL }}" \
            --build-arg VITE_KAKAO_CLIENT_ID="${{ secrets.VITE_KAKAO_CLIENT_ID }}" \
            --build-arg VITE_KAKAO_APP_KEY="${{ secrets.VITE_KAKAO_APP_KEY }}" \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: AWS_REGION,CONTAINER_NAME
          script: |
            # 1. Docker 로그인
            PASSWORD=$(aws ecr get-login-password --region ${{ env.AWS_REGION }})
            echo "$PASSWORD" | docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }}

            # 2. 기존 컨테이너 중지 및 삭제
            docker stop $CONTAINER_NAME || true
            docker rm $CONTAINER_NAME || true

            # 3. 새 컨테이너 실행 (Network: app-net 필수)
            # Nginx가 'gomin-client'라는 이름으로 찾으므로 --name 필수
            # 내부 포트 80을 사용하며, 호스트 포트는 매핑하지 않음 (Nginx 프록시 사용)
            docker run -d \
              --name $CONTAINER_NAME \
              --network app-net \
              --restart always \
              ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}

            # 4. 미사용 이미지 정리
            docker image prune -f
